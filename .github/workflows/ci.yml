name: CI

# Runs on every push to main and on every pull request.
# Pure validation — never touches AWS. Safe to run on untrusted PRs.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  app-checks:
    name: Python app & scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt ruff

      - name: Lint (critical errors only)
        run: ruff check --select E9,F63,F7,F82 app chaos infrastructure/lambda

      - name: Byte-compile all Python
        run: python -m compileall -q app chaos infrastructure/lambda

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Format check
        run: terraform -chdir=infrastructure/terraform fmt -check -recursive

      - name: Init (no backend — validation only)
        run: terraform -chdir=infrastructure/terraform init -backend=false

      - name: Validate
        run: terraform -chdir=infrastructure/terraform validate

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image (sanity check)
        run: docker build -t techstream-app:ci ./app
